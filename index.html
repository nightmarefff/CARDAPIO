<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Dog da Migué</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 2.5em;
            color: #ffcc00;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }

        .header p {
            font-size: 1.1em;
            color: #ccc;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 1.5em;
            color: #ffcc00;
            margin-bottom: 20px;
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 10px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.3s;
            padding: 15px;
            margin: 5px 0;
            border-radius: 8px;
        }

        .item:hover {
            background: rgba(255, 204, 0, 0.1);
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-name {
            flex: 1;
            font-size: 1.05em;
            font-weight: 500;
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .price {
            font-size: 1.1em;
            font-weight: bold;
            color: #ffcc00;
            min-width: 60px;
            text-align: right;
        }

        input[type="number"] {
            width: 60px;
            padding: 8px;
            border: 2px solid #ffcc00;
            border-radius: 6px;
            background: rgba(255, 204, 0, 0.1);
            color: #fff;
            text-align: center;
            font-size: 1em;
            font-weight: bold;
        }

        input[type="number"]:focus {
            outline: none;
            background: rgba(255, 204, 0, 0.2);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .total-section {
            background: rgba(255, 204, 0, 0.1);
            border: 2px solid #ffcc00;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-top: 30px;
        }

        .total-label {
            font-size: 1.2em;
            color: #ccc;
            margin-bottom: 10px;
        }

        .total-value {
            font-size: 2.2em;
            color: #ffcc00;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2em;
            }

            .section {
                padding: 15px;
            }

            .item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .item-controls {
                width: 100%;
                justify-content: space-between;
            }

            .price {
                min-width: 50px;
            }

            input[type="number"] {
                width: 50px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌭 Hot Dog da Migué</h1>
        <p>Cardápio Online</p>
    </div>

    <!-- HOT DOGS -->
    <div class="section">
        <div class="section-title">🌭 Hot Dogs</div>

        <div class="item">
            <span class="item-name">Hot dog 1 salsicha</span>
            <div class="item-controls">
                <span class="price">R$ 10,00</span>
                <input type="number" min="0" value="0" data-price="10">
            </div>
        </div>

        <div class="item">
            <span class="item-name">Hot dog 2 salsichas</span>
            <div class="item-controls">
                <span class="price">R$ 12,00</span>
                <input type="number" min="0" value="0" data-price="12">
            </div>
        </div>

        <div class="item">
            <span class="item-name">Hot dog calabresa</span>
            <div class="item-controls">
                <span class="price">R$ 14,00</span>
                <input type="number" min="0" value="0" data-price="14">
            </div>
        </div>

        <div class="item">
            <span class="item-name">Hot dog completo</span>
            <div class="item-controls">
                <span class="price">R$ 16,00</span>
                <input type="number" min="0" value="0" data-price="16">
            </div>
        </div>
    </div>

    <!-- BEBIDAS -->
    <div class="section">
        <div class="section-title">🥤 Bebidas</div>

        <div class="item">
            <span class="item-name">Refri lata</span>
            <div class="item-controls">
                <span class="price">R$ 6,00</span>
                <input type="number" min="0" value="0" data-price="6">
            </div>
        </div>

        <div class="item">
            <span class="item-name">Refri 200ml</span>
            <div class="item-controls">
                <span class="price">R$ 4,00</span>
                <input type="number" min="0" value="0" data-price="4">
            </div>
        </div>

        <div class="item">
            <span class="item-name">Suco 200ml</span>
            <div class="item-controls">
                <span class="price">R$ 5,00</span>
                <input type="number" min="0" value="0" data-price="5">
            </div>
        </div>

        <div class="item">
            <span class="item-name">Água</span>
            <div class="item-controls">
                <span class="price">R$ 3,00</span>
                <input type="number" min="0" value="0" data-price="3">
            </div>
        </div>
    </div>

    <!-- TOTAL -->
    <div class="total-section">
        <div class="total-label">Total do Pedido:</div>
        <div class="total-value">R$ <span id="total">0,00</span></div>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('input[type="number"]');
    
    function calculateTotal() {
        let total = 0;
        inputs.forEach(input => {
            const quantity = parseInt(input.value) || 0;
            const price = parseFloat(input.dataset.price);
            total += quantity * price;
        });
        
        document.getElementById('total').textContent = total.toLocaleString('pt-BR', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }
    
    inputs.forEach(input => {
        input.addEventListener('input', calculateTotal);
    });
</script>

</body>
</html>
